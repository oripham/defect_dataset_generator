{% extends "base.html" %}
{% set active = 'setup' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="fw-bold mb-0">🛠 Data Setup</h2>
</div>

<p class="text-muted mb-4">Connect the generation server and configure image folders and defect classes.</p>

<!-- Server Connection -->
<div class="card bg-dark-card mb-4 border-info">
  <div class="card-header border-info bg-transparent fw-bold text-info">
    🌐 1. Server Connection (GPU)
  </div>
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Server URL</label>
        <input type="text" id="server-url" class="form-control mb-2"
               value="{{ state.server_url }}" placeholder="http://localhost:8005">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">
          API Key <span class="text-muted fw-normal small">(RunPod API Key)</span>
        </label>
        <input type="password" id="api-key" class="form-control mb-2"
               value="{{ state.api_key }}" placeholder="rpa_xxxx...">
      </div>
      <div class="col-12 d-flex align-items-center gap-3">
        <button class="btn btn-outline-info" onclick="testConnection()">🔁 Test Connection</button>
        <div id="conn-result" class="small"></div>
      </div>
    </div>
  </div>
</div>


{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/setup.js') }}"></script>
{% endblock %}
