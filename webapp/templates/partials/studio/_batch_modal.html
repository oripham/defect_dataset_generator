<!-- ── Batch Modal ──────────────────────────────────────────────────────────── -->
<div id="batchModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
     background:rgba(0,0,0,0.7);z-index:9999;align-items:center;justify-content:center;">
  <div class="bg-dark border border-secondary rounded p-4 text-light" style="width:420px;max-width:95vw">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h6 class="text-warning mb-0">⚡ Batch Generate / バッチ生成</h6>
      <button class="btn btn-sm btn-outline-secondary" onclick="closeBatchModal()">✕</button>
    </div>

    <div class="mb-3">
      <label class="form-label small fw-semibold">Number of images / 生成枚数</label>
      <input type="number" id="batch-n" class="form-control bg-dark border-secondary text-light" value="20" min="1"
        max="500">
    </div>

    <div class="mb-2 small text-muted" id="batch-src-info"></div>

    <div class="mb-3" id="batch-crack-opts" style="display:none">
      <label class="form-label small fw-semibold">Break types / 割れ形状</label>
      <div class="d-flex flex-wrap gap-2">
        <div class="form-check"><input class="form-check-input" type="checkbox" id="bc-straight" value="straight"
            checked>
          <label class="form-check-label small" for="bc-straight">Straight</label>
        </div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="bc-corner" value="corner" checked>
          <label class="form-check-label small" for="bc-corner">Corner</label>
        </div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="bc-curved" value="curved" checked>
          <label class="form-check-label small" for="bc-curved">Curved</label>
        </div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="bc-concave" value="concave" checked>
          <label class="form-check-label small" for="bc-concave">Concave</label>
        </div>
      </div>
