<script>
  // ── Product catalog ───────────────────────────────────────────────────────────
  const GROUPS = {
    cap: {
      api: "cap",
      product: "mka",
      defects: [
        { key: "scratch", label: "Scratch / 傷", params: "scuff" },
        { key: "dent", label: "Dent / 凹み", params: null },
        { key: "plastic_flow", label: "Plastic Flow / 樹脂流れ", params: "plastic-flow-tune" },
        { key: "dark_spots", label: "Dark Spots / 黒異物", params: "spots" },
        { key: "thread", label: "Thread / 糸異物", params: null },
      ],
    },
    pharma: {
      api: "pharma",
      product: null,
      defects: [
        { key: "crack", label: "Crack / 割れ (Tablet)", params: "crack", product: "round_tablet" },
        { key: "dent", label: "Dent / 欠け (Tablet)", params: "dent", product: "round_tablet" },
        { key: "hollow", label: "Hollow / 空洞 (Capsule)", params: "hollow", product: "elongated_capsule" },
        { key: "underfill", label: "Underfill / 充填不足 (Capsule)", params: "hollow", product: "elongated_capsule" },
      ],
    },
    metal_cap: {
      api: "metal_cap",
      product: null,
      defects: [
        { key: "mc_deform", label: "MC Deform / MC変形", params: "polar" },
        { key: "ring_fracture", label: "Ring Fracture / 割れ輪", params: "napchai-ring" },
        { key: "scratch", label: "Scratch / 傷", params: null },
      ],
    },
  };

  // ── State ─────────────────────────────────────────────────────────────────────

  // ── Conditional AI Parameters ──────────────────────────────────────────────────
  function toggleAIParams() {
    const isAi = document.getElementById("chk-use-ai").checked;
    const divBlock = document.getElementById("params-diversity");
    if(divBlock) divBlock.style.display = isAi ? "flex" : "none";
  }
  let currentGroup = "cap";
  let okImageB64 = null;
  let ngRefB64 = null;
  let maskB64 = null;
  let resultB64 = null;
  let batchImagePool = [];
  let batchJobId = null;
  let batchTimer = null;

  // ── Init ──────────────────────────────────────────────────────────────────────
  document.addEventListener("DOMContentLoaded", async () => {
    selectGroup("cap");
    try {
      const resp = await fetch("/api/health");
      const data = await resp.json();
      if (!data.gpu_available) {
        console.warn("GPU health check failed or no GPU available, SDXL may fail.");
      }
    } catch (e) {
      console.warn("GPU health check failed", e);
    }
  });

  // ── Group select ──────────────────────────────────────────────────────────────
  function selectGroup(group) {
    currentGroup = group;
    okImageB64 = maskB64 = resultB64 = null;
    batchImagePool = [];
    document.getElementById("upload-ok").value = "";
    clearPanels(["panel-ok", "panel-mask", "panel-result", "panel-diff"]);
    document.getElementById("thumb-ok").style.display = "none";
    document.getElementById("mask-status").textContent = "";

    document.getElementById("btn-group-cap").className =
      "btn btn-sm flex-fill " + (group === "cap" ? "btn-info" : "btn-outline-info");
    document.getElementById("btn-group-pharma").className =
      "btn btn-sm flex-fill " + (group === "pharma" ? "btn-warning" : "btn-outline-warning");
    document.getElementById("btn-group-napchai").className =
      "btn btn-sm flex-fill " + (group === "metal_cap" ? "btn-success" : "btn-outline-success");

    const hints = ["group-cap-hint", "group-pharma-hint", "group-napchai-hint"];
    const activeHint = `group-${group === "metal_cap" ? "napchai" : group}-hint`;
    hints.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = (id === activeHint) ? "" : "none";
    });
    // Show NG ref upload for Metal Cap (IP-Adapter) and Pharma (Hybrid CV-AI)
    const showNgRef = (group === "metal_cap") || (group === "pharma");
    document.getElementById("ng-ref-wrap").style.display = showNgRef ? "" : "none";
    if (!showNgRef) clearNgRef();

    const sel = document.getElementById("sel-defect");
    sel.innerHTML = "";
    GROUPS[group].defects.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.key;
      opt.textContent = d.label;
      sel.appendChild(opt);
    });

    onDefectChange();
  }

  // ── Defect change ─────────────────────────────────────────────────────────────
  function onDefectChange() {
    const defectKey = document.getElementById("sel-defect").value;
    const entry = GROUPS[currentGroup].defects.find(d => d.key === defectKey) || {};
    const paramType = entry.params;

    // Hide ALL defect-specific parameter panels
    ["params-crack", "params-dent", "params-hollow", "params-polar", "params-scuff",
      "params-spots", "params-napchai-ring", "params-plastic-flow-tune"]
      .forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.classList.add("d-none");
          el.classList.remove("d-flex");
        }
      });

    // Show ONLY the matching panel for selected defect
    if (paramType) {
      const pEl = document.getElementById("params-" + paramType);
      if (pEl) {
        pEl.classList.remove("d-none");
        pEl.classList.add("d-flex");
      }
    }
    
    // (plastic_flow panel is now handled by GROUPS.params mapping above)

    // NG ref upload: Metal Cap (all) and Pharma (Hollow/Underfill)
    const showNgRef = (currentGroup === "metal_cap") ||
      (currentGroup === "pharma" && (defectKey === "hollow" || defectKey === "underfill"));
    const ngRefWrap = document.getElementById("ng-ref-wrap");
    const ngRefLabel = document.getElementById("ng-ref-label");

    if (showNgRef) {
      ngRefWrap.style.display = "";
      const ngRefLabel = document.getElementById("ng-ref-label");
      if (ngRefLabel) {
        if (currentGroup === "pharma") {
          ngRefLabel.innerHTML = 'NG Reference (Texture/Hollow) <span class="text-muted fw-normal">optional</span>';
        } else {
          ngRefLabel.innerHTML = 'NG Reference (IP-Adapter) <span class="text-muted fw-normal">optional</span>';
        }
      }
    } else {
      ngRefWrap.style.display = "none";
      clearNgRef();
    }

    // Draw-position canvas: Enable for ALL defect types as requested
    const showMcDraw = true;
    
    const drawWrap = document.getElementById("mc-mask-draw-wrap");
    if (drawWrap) {
      drawWrap.classList.remove("d-none");
    }

    // Rim offset slider: scratch (rim_col clipping) + ring_fracture (rim peak alignment)
    const showRimOffset = (currentGroup === "metal_cap") &&
      (defectKey === "scratch" || defectKey === "ring_fracture");
    const rimWrap = document.getElementById("mc-rim-offset-wrap");
    if (rimWrap) {
      if (showRimOffset) rimWrap.classList.remove("d-none");
      else rimWrap.classList.add("d-none");
    }

    if (!showMcDraw) {
      const panel = document.getElementById("mc-mask-panel");
      if (panel) panel.classList.add("d-none");
    }
    // Update hint text for mask panel
    const hintEl = document.getElementById("mc-mask-hint");
    if (hintEl) {
      if (currentGroup === "metal_cap") {
        if (defectKey === "scratch") hintEl.textContent = "Paint scratch region (slightly inside the outer rim), then click Set";
        else if (defectKey === "mc_deform") hintEl.textContent = "Paint a position on the outer rim (just to indicate location), then click Set";
        else if (defectKey === "ring_fracture") hintEl.textContent = "Paint a thin band on the rim you want to distort, then click Set";
        else hintEl.textContent = "Paint the defect region, then click Set";
      } else {
        hintEl.textContent = "Paint the defect region on the image, then click Set";
      }
    }
    // Reset stale mask when switching defect type within metal_cap
    // (avoid scratch mask accidentally sent to mc_deform or vice-versa)
    if (currentGroup === "metal_cap") {
      maskB64 = null;
      _mcResetCanvas();
      clearPanels(["panel-mask"]);
    }
    toggleAIParams();
  }

  // ── Upload single OK image ────────────────────────────────────────────────────
  function onUploadOk(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      okImageB64 = e.target.result.split(",")[1];
      const thumb = document.getElementById("thumb-ok");
      thumb.src = e.target.result;
      thumb.style.display = "";
      showPanel("panel-ok", okImageB64);
      maskB64 = null;
      clearPanels(["panel-mask", "panel-result", "panel-diff"]);
      document.getElementById("mask-status").textContent = "";
      document.getElementById("btn-save").disabled = true;
      document.getElementById("btn-download").disabled = true;
      // Reset Metal Cap draw-position canvas when a new OK image is loaded
      _mcResetCanvas();
      log("Uploaded: " + file.name);
    };
    reader.readAsDataURL(file);
  }

  // ── NG Reference upload + inline crop ────────────────────────────────────────
  let _ngFullImg = null;   // HTMLImageElement full NG
  let _ngCropRect = null;  // {x,y,w,h} in canvas px
  let _ngCropDraw = false, _ngCropSX = 0, _ngCropSY = 0;
  let _ngCropScale = 1;
  const _NG_CVW = 500;     // canvas display width

  function onUploadNgRef(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const img = new Image();
      img.onload = () => {
        _ngFullImg = img;
        ngRefB64 = dataUrl.split(",")[1];   // default: full image
        document.getElementById("thumb-ng-ref").src = dataUrl;
        document.getElementById("ng-ref-name").textContent = file.name;
        document.getElementById("ng-ref-dim").textContent = img.width + "×" + img.height + " (full)";
        document.getElementById("ng-ref-loaded").style.display = "";
        document.getElementById("ng-crop-panel").style.display = "none";
        log("NG ref loaded: " + file.name);
      };
      img.src = dataUrl;
    };
    reader.readAsDataURL(file);
  }

  function toggleNgCropPanel() {
    const panel = document.getElementById("ng-crop-panel");
    const open = panel.style.display !== "none";
    if (open) { panel.style.display = "none"; return; }
    panel.style.display = "";
    _initNgCropCanvas();
  }

  function _initNgCropCanvas() {
    if (!_ngFullImg) return;
    const cv = document.getElementById("ng-crop-canvas");
    _ngCropScale = Math.min(1, _NG_CVW / _ngFullImg.width);
    cv.width = Math.round(_ngFullImg.width * _ngCropScale);
    cv.height = Math.round(_ngFullImg.height * _ngCropScale);
    _ngCropRect = null;
    _renderNgCrop();
    cv.onmousedown = e => {
      const p = _ngCropPos(e); _ngCropSX = p[0]; _ngCropSY = p[1];
      _ngCropDraw = true; _ngCropRect = null;
    };
    cv.onmousemove = e => {
      if (!_ngCropDraw) return;
      const p = _ngCropPos(e);
      _ngCropRect = {
        x: Math.min(_ngCropSX, p[0]), y: Math.min(_ngCropSY, p[1]),
        w: Math.abs(p[0] - _ngCropSX), h: Math.abs(p[1] - _ngCropSY)
      };
      _renderNgCrop();
    };
    cv.onmouseup = () => { _ngCropDraw = false; };
  }

  function _ngCropPos(e) {
    const cv = document.getElementById("ng-crop-canvas");
    const r = cv.getBoundingClientRect();
    return [(e.clientX - r.left) * cv.width / r.width, (e.clientY - r.top) * cv.height / r.height];
  }

  function _renderNgCrop() {
    const cv = document.getElementById("ng-crop-canvas");
    const ctx = cv.getContext("2d");
    ctx.clearRect(0, 0, cv.width, cv.height);
    ctx.drawImage(_ngFullImg, 0, 0, cv.width, cv.height);
    const rc = _ngCropRect;
    if (rc && rc.w > 4 && rc.h > 4) {
      // dim outside
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, cv.width, rc.y);
      ctx.fillRect(0, rc.y + rc.h, cv.width, cv.height - rc.y - rc.h);
      ctx.fillRect(0, rc.y, rc.x, rc.h);
      ctx.fillRect(rc.x + rc.w, rc.y, cv.width - rc.x - rc.w, rc.h);
      // selection border
      ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 2;
      ctx.setLineDash([6, 3]); ctx.strokeRect(rc.x, rc.y, rc.w, rc.h);
      ctx.setLineDash([]);
      // size label
      const iw = Math.round(rc.w / _ngCropScale), ih = Math.round(rc.h / _ngCropScale);
      ctx.fillStyle = "#00d4ff"; ctx.font = "12px monospace";
      ctx.fillText(iw + "×" + ih, rc.x + 4, rc.y + rc.h - 4);
    }
  }

  function confirmNgCrop() {
    const rc = _ngCropRect;
    if (!rc || rc.w < 10 || rc.h < 10) {
      document.getElementById("ng-crop-hint").textContent = "⚠ Draw a region first";
      return;
    }
    const ix = Math.round(rc.x / _ngCropScale), iy = Math.round(rc.y / _ngCropScale);
    const iw = Math.round(rc.w / _ngCropScale), ih = Math.round(rc.h / _ngCropScale);
    const tmp = document.createElement("canvas");
    tmp.width = iw; tmp.height = ih;
    tmp.getContext("2d").drawImage(_ngFullImg, ix, iy, iw, ih, 0, 0, iw, ih);
    const dataUrl = tmp.toDataURL("image/png");
    ngRefB64 = dataUrl.split(",")[1];
    document.getElementById("thumb-ng-ref").src = dataUrl;
    document.getElementById("ng-ref-dim").textContent = "✂ " + iw + "×" + ih + " (cropped)";
    document.getElementById("ng-crop-panel").style.display = "none";
    log("NG ref cropped: " + iw + "×" + ih + "px");
  }

  function cancelNgCrop() {
    document.getElementById("ng-crop-panel").style.display = "none";
  }

  function clearNgRef() {
    ngRefB64 = null; _ngFullImg = null; _ngCropRect = null;
    const inp = document.getElementById("upload-ng-ref");
    if (inp) inp.value = "";
    document.getElementById("ng-ref-loaded").style.display = "none";
    document.getElementById("ng-crop-panel").style.display = "none";
  }

  // ── Upload multiple images for batch ─────────────────────────────────────────
  function onUploadBatchFiles(input) {
    batchImagePool = [];
    const files = Array.from(input.files);
    let loaded = 0;
    files.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = e => {
        batchImagePool[idx] = e.target.result.split(",")[1];
        loaded++;
        if (loaded === files.length) {
          document.getElementById("batch-files-count").textContent =
            `✅ ${files.length} images ready / ${files.length}枚準備完了`;
        }
      };
      reader.readAsDataURL(file);
    });
  }

  // ── Auto mask (Pharma / Otsu) ─────────────────────────────────────────────────
  async function runAutoMask() {
    if (!okImageB64) { alert("Upload an OK image first. / OK品画像をアップロードしてください。"); return; }
    document.getElementById("mask-status").textContent = "Detecting… / 検出中…";
    try {
      const resp = await fetch("/api/pharma/auto-mask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image_b64: okImageB64 }),
      });
      const data = await resp.json();
      if (data.error) { log("Mask error: " + data.error); return; }
      maskB64 = data.mask_b64;
      showPanel("panel-mask", maskB64);
      document.getElementById("mask-status").textContent =
        `✅ area=${data.mask_area}px  bbox=${JSON.stringify(data.bbox)}`;
      log(`Auto-mask: area=${data.mask_area}`);
    } catch (e) { log("Auto-mask error: " + e); }
  }

  // ── Preview ───────────────────────────────────────────────────────────────────
  async function runPreview() {
    if (!okImageB64) { alert("Upload an OK image first. / OK品画像をアップロードしてください。"); return; }
    const btnEl = document.getElementById("btn-preview");
    btnEl.disabled = true;
    btnEl.textContent = "⏳ Generating… / 生成中…";
    log("Running preview…");

    const grp = GROUPS[currentGroup];
    const defectKey = document.getElementById("sel-defect").value;
    console.log("[JS] runPreview started", { group: currentGroup, defectKey });
    const entry = grp.defects.find(d => d.key === defectKey) || {};
    const api = grp.api;
    const product = entry.product || grp.product || currentGroup;
    const params = buildParams();

    try {
      const resp = await fetch(`/api/${api}/preview`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          image_b64: okImageB64,
          mask_b64: maskB64 || null,
          product,
          defect_type: defectKey,
          params,
          ref_image_b64: ngRefB64 || null,
        }),
      });
      console.log("[JS] Fetch response status:", resp.status);
      const data = await resp.json();
      if (data.error) { 
        log("Error: " + data.error); 
        alert("Server Error: " + data.error);
        return; 
      }

      resultB64 = data.result_image;
      maskB64 = data.mask_b64 || maskB64;

      showPanel("panel-result", data.result_image);
      if (maskB64) showPanel("panel-mask", maskB64);
      if (data.debug_panel) showPanel("panel-diff", data.debug_panel);

      setQC(data.qc);
      log(`Done — engine=${data.engine || api}  QC=${data.qc?.verdict || "—"}`);
      addHistory(data.result_image);
      const bSave = document.getElementById("btn-save");
      if (bSave) bSave.disabled = false;
      const bDown = document.getElementById("btn-download");
      if (bDown) bDown.disabled = false;
      const bPrev = document.getElementById("btn-preview");
      if (bPrev) bPrev.disabled = false;

      // Reset and show evaluation panel
      const evPl = document.getElementById("eval-placeholder");
      if (evPl) evPl.style.display = "none";
      const evPa = document.getElementById("eval-panel");
      if (evPa) evPa.style.display = "flex";
      const evSt = document.getElementById("eval-status");
      if (evSt) evSt.textContent = "";
      const frW = document.getElementById("fail-reasons-wrap");
      if (frW) frW.style.display = "none";
      document.getElementById("btn-eval-success").disabled = false;
      document.getElementById("btn-eval-failed").disabled = false;
      document.querySelectorAll(".eval-reason-chk").forEach(el => el.checked = false);
      document.getElementById("fail-reason-other").value = "";
    } catch (e) {
      log("Preview error: " + e);
    } finally {
      btnEl.disabled = false;
      btnEl.textContent = "▶ Preview / プレビュー";
    }
  }

  // ── Build params ──────────────────────────────────────────────────────────────
  function buildParams() {
    const defectKey = document.getElementById("sel-defect").value;
    const isAiChecked = document.getElementById("chk-use-ai").checked;

    const p = {
      intensity: parseInt(document.getElementById("slider-intensity")?.value || 70) / 100,
      seed: parseInt(document.getElementById("inp-seed")?.value) || 42,
      sdxl: isAiChecked,
      use_genai: isAiChecked, // For Other engine fallback
      sdxl_refine: isAiChecked, // For metal cap deformed metrics
      refine_ai: isAiChecked, // For pharma
      use_ai: isAiChecked, // Standardized alias
    };
    if (defectKey === "crack") {
      p.break_type = document.getElementById("sel-break-type").value;
      p.depth = parseInt(document.getElementById("slider-depth").value) / 100;
      const angleRandom = document.getElementById("chk-angle-random").checked;
      p.angle = angleRandom
        ? Math.floor(Math.random() * 8) * 45
        : parseFloat(document.getElementById("slider-angle").value);
    }
    if (defectKey === "dent") {
      p.dent_strength = parseFloat(document.getElementById("slider-dent-strength").value);
      p.dent_size = parseFloat(document.getElementById("slider-dent-size").value);
    }
    if (defectKey === "hollow" || defectKey === "underfill") {
      const fixedEl = document.getElementById("chk-fixed-region");
      if (fixedEl) p.fixed_region = fixedEl.checked;
      p.refine_ai = isAiChecked;
    }
    // NG reference image for IP-Adapter (Metal Cap) or Hybrid (Pharma)
    if (ngRefB64) {
      p.ref_image_b64 = ngRefB64;
    }
    // Napchai: polar mc_deform params
    if (defectKey === "mc_deform" && currentGroup === "metal_cap") {
      let thetaIdx = document.getElementById("sel-theta").value;
      if (thetaIdx !== "random") {
        p.theta_center = parseFloat(thetaIdx);
      }
      
      // Convert UI Span (Degrees) to Radians for Backend consistency
      const spanDeg = parseFloat(document.getElementById("slider-span").value);
      p.theta_span = (spanDeg * Math.PI) / 180.0;
      
      // Always send depth so the specific slider/global depth is honored
      p.depth = parseFloat(document.getElementById("slider-deform").value);
      log(`MC Deform params: depth=${p.depth}, span_deg=${spanDeg}, intensity=${p.intensity}`);
    }
    // Napchai / Metal Cap: ring_fracture params
    if (defectKey === "ring_fracture" && currentGroup === "metal_cap") {
      const ampEl = document.getElementById("slider-amplitude");
      const falloffEl = document.getElementById("slider-falloff");
      if (ampEl) p.jitter_amplitude = parseFloat(ampEl.value);
      if (falloffEl) p.falloff_width = parseFloat(falloffEl.value);
    }
    // Napchai / Metal Cap: rim offset (align rim_col with manual expectation)
    if (currentGroup === "metal_cap" && (defectKey === "scratch" || defectKey === "ring_fracture")) {
      const offEl = document.getElementById("mc-rim-offset");
      if (offEl) p.rim_offset = parseInt(offEl.value) || 0;
    }
    if (defectKey === "scratch") {
      p.mode = document.getElementById("sel-mode").value;
    }
    if (currentGroup === "cap" && defectKey === "plastic_flow") {
      p.patch_max_dim = parseInt(document.getElementById("slider-pf-maxdim").value);
      p.patch_scale = parseFloat(document.getElementById("slider-pf-scale").value);
      p.synth_positive_only = document.getElementById("chk-pf-shadowfree").checked;
    }
    if (defectKey === "dark_spots") {
      p.n_spots_min = 1;
      p.n_spots_max = 1;
      p.r_min = parseInt(document.getElementById("inp-r-min").value);
      p.r_max = parseInt(document.getElementById("inp-r-max").value);
      p.bump = true;
    }
    return p;
  }

  // ── Save / Download ───────────────────────────────────────────────────────────
  async function saveResult() {
    if (!resultB64) return;
    const grp = GROUPS[currentGroup];
    const defectKey = document.getElementById("sel-defect").value;
    const entry = grp.defects.find(d => d.key === defectKey) || {};
    const api = grp.api;
    const product = entry.product || grp.product || currentGroup;
    try {
      const resp = await fetch(`/api/${api}/save`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          result_b64: resultB64,
          mask_b64: maskB64,
          product,
          defect_type: defectKey,
          params: buildParams(),
        }),
      });
      const d = await resp.json();
      log("Saved → " + (d.path || "?"));
    } catch (e) { log("Save error: " + e); }
  }

  function downloadResult() {
    if (!resultB64) return;
    const defectKey = document.getElementById("sel-defect").value;
    const a = document.createElement("a");
    a.href = "data:image/png;base64," + resultB64;
    a.download = `${defectKey}_result.png`;
    a.click();
  }

  // ── Batch ─────────────────────────────────────────────────────────────────────
  function openBatchModal() {
    const defectKey = document.getElementById("sel-defect").value;
    document.getElementById("batch-crack-opts").style.display = defectKey === "crack" ? "" : "none";
    document.getElementById("batch-progress-wrap").style.display = "none";
    document.getElementById("btn-batch-start").disabled = false;

    const srcInfo = document.getElementById("batch-src-info");
    if (batchImagePool.length > 0)
      srcInfo.textContent = `✅ ${batchImagePool.length} source images / ${batchImagePool.length}枚のソース画像`;
    else if (okImageB64)
      srcInfo.textContent = "⚠️ Single OK image will be reused. / 1枚のOK画像を繰り返し使用します。";
    else
      srcInfo.textContent = "❌ No OK image loaded. / OK品画像がありません。";

    document.getElementById("batchModal").style.display = "flex";
  }

  function closeBatchModal() {
    document.getElementById("batchModal").style.display = "none";
  }

  async function startBatch() {
    if (!okImageB64 && batchImagePool.length === 0) {
      alert("Upload at least one OK image first. / OK品画像をアップロードしてください。");
      return;
    }
    const grp = GROUPS[currentGroup];
    const defectKey = document.getElementById("sel-defect").value;
    const entry = grp.defects.find(d => d.key === defectKey) || {};
    const api = grp.api;
    const product = entry.product || grp.product || currentGroup;
    const nImages = parseInt(document.getElementById("batch-n").value) || 20;
    const params = buildParams();
    const breakTypes = [];
    document.querySelectorAll("#batch-crack-opts input[type=checkbox]:checked")
      .forEach(cb => breakTypes.push(cb.value));

    const imagePool = batchImagePool.length > 0 ? batchImagePool : [okImageB64];

    document.getElementById("batch-progress-wrap").style.display = "";
    document.getElementById("btn-batch-start").disabled = true;
    log(`Batch start: ${nImages} images, source pool=${imagePool.length}`);

    const resp = await fetch(`/api/${api}/batch`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        product,
        defect_type: defectKey,
        n_images: nImages,
        params,
        break_types: breakTypes,
        image_b64: imagePool[0],
        images_b64: imagePool,
      }),
    });
    const d = await resp.json();
    if (d.error) { log("Batch error: " + d.error); return; }
    batchJobId = d.job_id;
    log(`Batch queued — job=${batchJobId}`);
    batchTimer = setInterval(() => pollBatch(api), 1500);
  }

  async function pollBatch(api) {
    if (!batchJobId) return;
    const resp = await fetch(`/api/${api}/batch/${batchJobId}`);
    const d = await resp.json();
    document.getElementById("batch-bar").style.width = (d.progress || 0) + "%";
    document.getElementById("batch-status-text").textContent =
      `${d.generated || 0} / ${d.total || 0} — ${d.status}`;
    if (d.status === "done" || d.status === "error") {
      clearInterval(batchTimer);
      document.getElementById("btn-batch-start").disabled = false;
      log(`Batch done → ${d.out_dir || d.error || ""}`);
    }
  }

  // ── QC / Helpers ──────────────────────────────────────────────────────────────
  function setQC(qc) {
    const el = document.getElementById("qc-panel");
    if (!el) return; // Defensive: don't crash if panel is missing
    if (!qc) {
      el.innerHTML = '<div class="text-muted small">Run preview first / プレビューを実行して表示</div>';
      return;
    }
    const verdict = qc.verdict || "—";
    const color = verdict.includes("PASS") ? "success" : verdict.includes("WARN") ? "warning" : "secondary";
    let html = `<span class="badge bg-${color} mb-2 fs-6">${verdict}</span><br>`;
    Object.entries(qc).forEach(([k, v]) => {
      if (k === "verdict") return;
      html += `<div class="small text-muted">${k}: <span class="text-light">${typeof v === "number" ? v.toFixed(3) : v}</span></div>`;
    });
    el.innerHTML = html;
  }

  function showPanel(id, b64) {
    if (!b64) return;
    document.getElementById(id).src = b64.startsWith("data:") ? b64 : "data:image/png;base64," + b64;
  }
  function clearPanels(ids) {
    ids.forEach(id => { const el = document.getElementById(id); if (el) el.src = ""; });
  }
  function addHistory(b64) {
    const strip = document.getElementById("history-strip");
    const img = document.createElement("img");
    img.src = "data:image/png;base64," + b64;
    img.className = "rounded border border-secondary";
    img.style = "width:56px;height:56px;object-fit:contain;cursor:pointer;background:#111";
    img.onclick = () => { resultB64 = b64; showPanel("panel-result", b64); };
    strip.prepend(img);
    if (strip.children.length > 12) strip.removeChild(strip.lastChild);
  }
  function randomSeed() {
    const el = document.getElementById("inp-seed");
    if (el) el.value = Math.floor(Math.random() * 9999);
  }
  function onAngleRandomToggle() {
    const isRandom = document.getElementById("chk-angle-random").checked;
    const slider = document.getElementById("slider-angle");
    const label = document.getElementById("val-angle");
    slider.disabled = isRandom;
    label.textContent = isRandom ? "Random" : slider.value + "°";
  }
  function clearLog() {
    document.getElementById("log-box").textContent = "";
  }
  function log(msg) {
    const box = document.getElementById("log-box");
    const ts = new Date().toTimeString().slice(0, 8);
    box.textContent += `[${ts}] ${msg}\n`;
    box.scrollTop = box.scrollHeight;
  }

  // ── Metal Cap: draw-position canvas ──────────────────────────────────────────
  let _mcBaseImg = null;   // HTMLImageElement for the OK image
  let _mcMaskOff = null;   // offscreen canvas tracking painted pixels
  let _mcDrawing = false;
  let _mcBrushSz = 20;

  function _mcResetCanvas() {
    _mcBaseImg = null; _mcMaskOff = null; _mcDrawing = false;
    const panel = document.getElementById("mc-mask-panel");
    if (panel) panel.classList.add("d-none");
    document.getElementById("mc-mask-hint").textContent = "Paint the defect region, then click Set";
    const offEl = document.getElementById("mc-rim-offset");
    const offLbl = document.getElementById("mc-rim-offset-lbl");
    if (offEl) offEl.value = 0;
    if (offLbl) offLbl.textContent = "0";
  }

  function toggleMcMaskPanel() {
    const panel = document.getElementById("mc-mask-panel");
    if (!panel) return;
    const isHidden = panel.classList.contains("d-none");
    if (!isHidden) { 
      panel.classList.add("d-none"); 
      return; 
    }
    if (!okImageB64) { alert("Upload an OK image first."); return; }
    panel.classList.remove("d-none");
    _initMcMaskCanvas();
  }

  function _initMcMaskCanvas() {
    const cv = document.getElementById("mc-mask-canvas");
    const ctx = cv.getContext("2d");
    const MAX_W = 600;
    const img = new Image();
    img.onload = () => {
      _mcBaseImg = img;
      const scale = Math.min(1, MAX_W / img.width);
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      _mcMaskOff = document.createElement("canvas");
      _mcMaskOff.width = cv.width;
      _mcMaskOff.height = cv.height;
      _mcMaskOff.getContext("2d").clearRect(0, 0, cv.width, cv.height);
      _mcRender(cv, ctx);
      cv.onmousedown = e => { _mcDrawing = true; _mcDraw(e, cv, ctx); };
      cv.onmousemove = e => { if (_mcDrawing) _mcDraw(e, cv, ctx); };
      cv.onmouseup = () => { _mcDrawing = false; };
      cv.onmouseleave = () => { _mcDrawing = false; };
    };
    img.src = "data:image/png;base64," + okImageB64;
  }

  function _mcRender(cv, ctx) {
    ctx.drawImage(_mcBaseImg, 0, 0, cv.width, cv.height);
    ctx.globalAlpha = 0.5;
    ctx.drawImage(_mcMaskOff, 0, 0);
    ctx.globalAlpha = 1;
  }

  function _mcDraw(e, cv, ctx) {
    const r = cv.getBoundingClientRect();
    const x = (e.clientX - r.left) * cv.width / r.width;
    const y = (e.clientY - r.top) * cv.height / r.height;
    const mCtx = _mcMaskOff.getContext("2d");
    mCtx.fillStyle = "#ff6400";
    mCtx.beginPath();
    mCtx.arc(x, y, _mcBrushSz / 2, 0, Math.PI * 2);
    mCtx.fill();
    _mcRender(cv, ctx);
  }

  function clearMcMask() {
    maskB64 = null;
    if (!_mcMaskOff || !_mcBaseImg) return;
    _mcMaskOff.getContext("2d").clearRect(0, 0, _mcMaskOff.width, _mcMaskOff.height);
    const cv = document.getElementById("mc-mask-canvas");
    _mcRender(cv, cv.getContext("2d"));
    document.getElementById("mc-mask-hint").textContent = "Paint the defect region, then click Set";
  }

  function confirmMcMask() {
    if (!_mcMaskOff || !_mcBaseImg) return;
    // Scale the painted offscreen mask back to OK image resolution → grayscale B&W
    const outCv = document.createElement("canvas");
    outCv.width = _mcBaseImg.width;
    outCv.height = _mcBaseImg.height;
    const outCtx = outCv.getContext("2d");
    outCtx.drawImage(_mcMaskOff, 0, 0, outCv.width, outCv.height);
    // Convert: any painted pixel (R channel > 50) → white, else → black
    const id = outCtx.getImageData(0, 0, outCv.width, outCv.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = d[i] > 50 ? 255 : 0;
      d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
    }
    outCtx.putImageData(id, 0, 0);
    maskB64 = outCv.toDataURL("image/png").split(",")[1];
    showPanel("panel-mask", maskB64);
    
    // UI Feedback: Indicate that Mask is now the primary source
    const hintEl = document.getElementById("mc-mask-hint");
    if (hintEl) hintEl.innerHTML = '<span class="text-success fw-bold">✅ MASK LOCKED</span> — Position/Span now controlled by drawing';
    
    const selTheta = document.getElementById("sel-theta");
    if (selTheta) {
      // Add a temporary "Locked to Mask" option if not present
      if (!Array.from(selTheta.options).some(o => o.value === "mask_locked")) {
        const opt = new Option("Locked to Mask 🔒", "mask_locked");
        selTheta.add(opt);
      }
      selTheta.value = "mask_locked";
    }

    const panel = document.getElementById("mc-mask-panel");
    if (panel) panel.classList.add("d-none");
    log("MC mask confirmed: overriding position defaults.");
  }
  function toggleFailReasons() {
    const wrap = document.getElementById("fail-reasons-wrap");
    wrap.style.display = wrap.style.display === "none" ? "block" : "none";
  }

  async function evaluateResult(status) {
    if (!resultB64) {
      alert("No result to evaluate. / 評価する結果がありません。");
      return;
    }

    let reasons = [];
    if (status === 'failed') {
      document.querySelectorAll(".eval-reason-chk:checked").forEach(chk => {
        reasons.push(chk.value);
      });
      const otherReason = document.getElementById("fail-reason-other").value.trim();
      if (otherReason) reasons.push("other: " + otherReason);

      if (reasons.length === 0) {
        alert("Please select at least one reason for failure. / 失敗の理由を少なくとも1つ選択してください。");
        return;
      }
    }

    const btnSuccess = document.getElementById("btn-eval-success");
    const btnFailed = document.getElementById("btn-eval-failed");
    const btnSubmit = document.getElementById("btn-submit-fail");
    btnSuccess.disabled = true;
    btnFailed.disabled = true;
    if (btnSubmit) btnSubmit.disabled = true;

    const statusEl = document.getElementById("eval-status");
    if (statusEl) statusEl.innerHTML = "Saving... ⏳";

    try {
      const defectKey = document.getElementById("sel-defect").value;
      const grp = GROUPS[currentGroup];
      const product = grp.product || currentGroup;

      const payload = {
        base_image: okImageB64,
        result_image: resultB64,
        mask_image: maskB64,
        ref_image_b64: ngRefB64,
        defect_type: defectKey,
        product: product,
        params: buildParams(),
        status: status,
        reasons: reasons
      };

      const resp = await fetch("/api/eval/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!resp.ok) throw new Error("Server error " + resp.status);
      const data = await resp.json();

      document.getElementById("eval-status").innerHTML = `<span class="text-success">✅ Saved to database</span>`;
      if (status === 'failed') {
        document.getElementById("fail-reasons-wrap").style.display = "none";
      }
    } catch (e) {
      log("Evaluation error: " + e);
      document.getElementById("eval-status").innerHTML = `<span class="text-danger">❌ Failed to save</span>`;
      btnSuccess.disabled = false;
      btnFailed.disabled = false;
      if (btnSubmit) btnSubmit.disabled = false;
    }
  }
</script>
