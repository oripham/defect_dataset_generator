<div class="col-lg-4 col-xl-3 d-flex flex-column gap-3">

      <!-- 1. Product Type / 製品種別 -->
      <div class="card bg-dark-card border-secondary">
        <div class="card-header border-secondary bg-transparent fw-bold text-info">
          1. Product Type <span class="text-muted fw-normal small">/ 製品種別</span>
        </div>
        <div class="card-body py-2">
          <div class="d-flex gap-2 flex-wrap">
            <button id="btn-group-cap" class="btn btn-sm btn-outline-info flex-fill" onclick="selectGroup('cap')">
              Cap / キャップ
            </button>
            <button id="btn-group-pharma" class="btn btn-sm btn-outline-warning flex-fill"
              onclick="selectGroup('pharma')">
              Pharma / 医薬品
            </button>
            <button id="btn-group-napchai" class="btn btn-sm btn-outline-success flex-fill"
              onclick="selectGroup('metal_cap')">
              Metal Cap / 金属
            </button>
          </div>
          <div id="group-cap-hint" class="small text-muted mt-1">MKA Cap — Mask-based synthesis / マスクベース合成</div>
          <div id="group-pharma-hint" class="small text-muted mt-1" style="display:none">Tablet — CV + SDXL / 錠剤</div>
          <div id="group-napchai-hint" class="small text-muted mt-1" style="display:none">Metal Cap — Polar + SDXL / 金属キャップ</div>
        </div>
      </div>

      <!-- 2. Defect Class / 欠陥種別 -->
      <div class="card bg-dark-card border-secondary">
        <div class="card-header border-secondary bg-transparent fw-bold text-info">
          2. Defect Class <span class="text-muted fw-normal small">/ 欠陥種別</span>
        </div>
        <div class="card-body py-2">
          <select id="sel-defect" class="form-select form-select-sm bg-dark border-secondary text-warning"
            onchange="onDefectChange()">
          </select>
        </div>
      </div>

      <!-- 3. Input Images / 入力画像 -->
      <div class="card bg-dark-card border-secondary">
        <div class="card-header border-secondary bg-transparent fw-bold text-info">
          3. Input Image <span class="text-muted fw-normal small">/ 入力画像</span>
        </div>
        <div class="card-body py-2">

          <!-- OK Image — compact row -->
          <div class="d-flex align-items-center gap-2 mb-2">
            <img id="thumb-ok" src="" style="width:40px;height:40px;display:none;object-fit:cover;border-radius:4px;border:1px solid #555;flex-shrink:0;background:#111">
            <div class="flex-grow-1">
              <label class="form-label small fw-semibold text-muted mb-1">OK image / OK品画像</label>
              <input type="file" id="upload-ok"
                class="form-control form-control-sm bg-dark border-secondary text-light" accept="image/*"
                onchange="onUploadOk(this)" style="font-size:11px">
            </div>
          </div>

          <!-- Batch multi-upload (hidden by default) -->
          <div id="upload-multi-wrap" style="display:none" class="mb-2">
            <label class="form-label small fw-semibold text-muted mb-1">Batch: multiple images / バッチ：複数画像</label>
            <input type="file" id="upload-batch-files"
              class="form-control form-control-sm bg-dark border-secondary text-light" accept="image/*" multiple
              onchange="onUploadBatchFiles(this)" style="font-size:11px">
            <div id="batch-files-count" class="small text-muted"></div>
          </div>

          <!-- Mask status -->
          <div id="mask-status" class="small text-muted"></div>

          <!-- Draw Mask button — ABOVE NG ref -->
          <div id="mc-mask-draw-wrap" class="mb-2 d-none">
            <div class="d-flex gap-1 mb-1">
              <button class="btn btn-sm btn-info flex-grow-1 py-1 fw-bold" style="font-size:12px" onclick="_meOpen()">
                Draw Mask / マスク描画
              </button>
              <label class="btn btn-sm btn-outline-info py-1 fw-bold mb-0" style="font-size:12px;cursor:pointer">
                Upload / 読込
                <input type="file" id="upload-mask" accept="image/*" style="display:none"
                  onchange="onUploadMask(this)">
              </label>
            </div>
            <div id="mc-mask-panel" class="mt-1 d-none">
              <canvas id="mc-mask-canvas" style="display:none"></canvas>
              <div id="mc-rim-offset-wrap" class="d-none">
                <div class="d-flex align-items-center gap-2">
                  <span class="small text-muted">Rim offset / リムオフセット:</span>
                  <input type="range" id="mc-rim-offset" min="-80" max="80" value="0" style="width:100px"
                    oninput="document.getElementById('mc-rim-offset-lbl').textContent=this.value">
                  <span id="mc-rim-offset-lbl" class="small text-info" style="min-width:22px">0</span>
                  <span class="small text-muted">px</span>
                </div>
              </div>
              <div id="mc-mask-hint" class="small text-muted mt-1"></div>
            </div>
          </div>

          <!-- NG Reference — BELOW mask draw -->
          <div id="ng-ref-wrap" style="display:none" class="border-top border-secondary pt-2">
            <div class="d-flex align-items-center gap-2">
              <img id="thumb-ng-ref" src="" style="width:40px;height:40px;display:none;object-fit:cover;border-radius:4px;border:1px solid #555;flex-shrink:0">
              <div class="flex-grow-1">
                <label id="ng-ref-label" class="form-label small fw-semibold text-muted mb-1">NG Reference / NG参照
                  <span class="text-muted fw-normal">optional / 任意</span></label>
                <input type="file" id="upload-ng-ref"
                  class="form-control form-control-sm bg-dark border-secondary text-light" accept="image/*"
                  onchange="onUploadNgRef(this)" style="font-size:11px">
              </div>
            </div>
            <!-- After upload: info + crop -->
            <div id="ng-ref-loaded" style="display:none" class="mt-1">
              <div class="d-flex align-items-center gap-2 mb-1">
                <span id="ng-ref-name" class="small text-success text-truncate flex-grow-1"></span>
                <span id="ng-ref-dim" class="small text-muted"></span>
                <button class="btn btn-link btn-sm text-danger p-0" style="font-size:12px" onclick="clearNgRef()">X</button>
              </div>
              <button class="btn btn-sm btn-outline-info w-100 py-1 fw-bold" style="font-size:12px" onclick="_ngCropOpen()">
                Crop NG Reference (Zoom + Select) / NG切り抜き
              </button>
            </div>
          </div>

        </div>
      </div>

      <!-- Action buttons -->
      <button id="btn-preview" class="btn btn-primary fw-bold" onclick="runPreview()">
        Preview / プレビュー
      </button>
      <button id="btn-batch" class="btn btn-outline-warning fw-bold" onclick="openBatchModal()">
        Batch Generate / バッチ生成
      </button>

    </div><!-- /left -->
