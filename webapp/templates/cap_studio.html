{% extends "base.html" %}
{% set active = 'cap' %}

{% block content %}
<div class="d-flex gap-3" style="min-height:calc(100vh - 2rem)">

  <!-- ── Left: Controls ──────────────────────────────────────── -->
  <div class="card bg-dark border-secondary" style="width:280px;min-width:280px;overflow-y:auto">
    <div class="card-body p-3">
      <h6 class="text-warning fw-bold mb-3">🔩 Cap Studio — MKA</h6>

      <!-- Product (fixed MKA for now) -->
      <label class="form-label small fw-semibold">Product</label>
      <select id="sel-product" class="form-select form-select-sm bg-dark border-secondary text-light mb-2"
              onchange="onProductChange()">
        <option value="mka">MKA Cap</option>
      </select>

      <!-- Defect type -->
      <label class="form-label small fw-semibold">Defect Type</label>
      <select id="sel-defect" class="form-select form-select-sm bg-dark border-secondary text-light mb-3"
              onchange="onDefectChange()">
        <option value="scratch">Scratch (Xước)</option>
        <option value="dent">Dent (Lõm)</option>
        <option value="plastic_flow">Plastic Flow (Nhựa chảy)</option>
        <option value="thread">Thread (Dị vật chỉ)</option>
        <option value="dark_spots">Dark Spots (Dị vật đen)</option>
      </select>

      <!-- Upload OK image -->
      <label class="form-label small fw-semibold">OK Image</label>
      <input type="file" id="inp-ok-file" class="form-control form-control-sm bg-dark border-secondary text-light mb-1"
             accept=".png,.jpg,.bmp" onchange="onOkUpload(this)">
      <button class="btn btn-outline-secondary btn-sm w-100 mb-3" onclick="loadOkLibrary()">
        📂 Load from library
      </button>

      <hr class="border-secondary my-2">

      <!-- Common params -->
      <label class="form-label small fw-semibold">Intensity / Strength</label>
      <div class="d-flex align-items-center gap-2 mb-2">
        <span id="val-intensity" class="small text-info" style="width:32px">0.7</span>
        <input type="range" class="form-range flex-grow-1" id="slider-intensity"
               min="0.1" max="1.0" step="0.05" value="0.7"
               oninput="document.getElementById('val-intensity').textContent=parseFloat(this.value).toFixed(2)">
      </div>

      <!-- Polar-specific params -->
      <div id="params-polar" style="display:none">
        <label class="form-label small fw-semibold">Deform Position (θ clock)</label>
        <select id="sel-theta" class="form-select form-select-sm bg-dark border-secondary text-light mb-2">
          <option value="0">12 o'clock (top)</option>
          <option value="1.571">3 o'clock (right)</option>
          <option value="3.1416" selected>6 o'clock (bottom)</option>
          <option value="4.712">9 o'clock (left)</option>
          <option value="random">Random</option>
        </select>
        <label class="form-label small fw-semibold">Deform Width (span)</label>
        <div class="d-flex align-items-center gap-2 mb-2">
          <span id="val-span" class="small text-info" style="width:32px">0.39</span>
          <input type="range" class="form-range flex-grow-1" id="slider-span"
                 min="0.1" max="1.2" step="0.05" value="0.39"
                 oninput="document.getElementById('val-span').textContent=parseFloat(this.value).toFixed(2)">
        </div>
        <label class="form-label small fw-semibold">Deform Depth</label>
        <div class="d-flex align-items-center gap-2 mb-2">
          <span id="val-depth" class="small text-info" style="width:32px">15</span>
          <input type="range" class="form-range flex-grow-1" id="slider-depth"
                 min="3" max="40" step="1" value="15"
                 oninput="document.getElementById('val-depth').textContent=this.value">
        </div>
        <!-- Ring fracture specific -->
        <div id="params-ring" style="display:none">
          <label class="form-label small fw-semibold">Jitter Amplitude</label>
          <div class="d-flex align-items-center gap-2 mb-2">
            <span id="val-jitter" class="small text-info" style="width:32px">6</span>
            <input type="range" class="form-range flex-grow-1" id="slider-jitter"
                   min="1" max="20" step="0.5" value="6"
                   oninput="document.getElementById('val-jitter').textContent=parseFloat(this.value).toFixed(1)">
          </div>
        </div>
      </div>

      <!-- Scratch-specific params -->
      <div id="params-scratch" style="display:none">
        <label class="form-label small fw-semibold">Scuff Style</label>
        <select id="sel-mode" class="form-select form-select-sm bg-dark border-secondary text-light mb-2">
          <option value="auto">Auto</option>
          <option value="whiten_streak">Whiten Streak</option>
          <option value="micro_haze">Micro Haze</option>
          <option value="gouge_whiten">Gouge Whiten</option>
          <option value="parallel_micro">Parallel Micro</option>
          <option value="crosshatch">Crosshatch</option>
        </select>
      </div>

      <!-- Dark spots params -->
      <div id="params-spots" style="display:none">
        <label class="form-label small fw-semibold">Spot Radius (min–max px)</label>
        <div class="d-flex gap-2 mb-2">
          <input type="number" id="inp-r-min" class="form-control form-control-sm bg-dark border-secondary text-light" value="1" min="1" max="50" style="width:60px">
          <span class="small text-muted align-self-center">–</span>
          <input type="number" id="inp-r-max" class="form-control form-control-sm bg-dark border-secondary text-light" value="3" min="1" max="80" style="width:60px">
        </div>
      </div>

      <!-- Seed -->
      <label class="form-label small fw-semibold">Seed</label>
      <div class="input-group input-group-sm mb-3">
        <input type="number" id="inp-seed" class="form-control bg-dark border-secondary text-light" value="42">
        <button class="btn btn-outline-secondary" onclick="randomSeed()" title="Random">🎲</button>
      </div>

    </div>
  </div>

  <!-- ── Center: Canvas ──────────────────────────────────────── -->
  <div class="flex-grow-1 d-flex flex-column gap-3">

    <!-- Action bar -->
    <div class="d-flex gap-2 align-items-center">
      <button id="btn-preview" class="btn btn-primary fw-bold px-4" onclick="runPreview()">
        ⚡ Preview
      </button>
      <button class="btn btn-outline-info" onclick="document.getElementById('batch-modal').style.display='flex'">
        📦 Batch
      </button>
      <button class="btn btn-outline-secondary" onclick="detectCircle()">
        🔵 Detect Circle
      </button>
      <span id="status-msg" class="small text-muted ms-2"></span>
    </div>

    <!-- 2×2 canvas grid: OK | Mask | Result | Diff -->
    <div class="d-grid gap-2" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr">
      <div class="position-relative">
        <div class="small text-muted mb-1">OK Image</div>
        <canvas id="canvas-ok" class="w-100 rounded border border-secondary" style="max-height:300px;object-fit:contain;background:#111"></canvas>
        <div id="circle-overlay" class="position-absolute top-0 start-0 w-100 h-100" style="pointer-events:none"></div>
      </div>
      <div>
        <div class="small text-muted mb-1">Mask</div>
        <canvas id="canvas-mask" class="w-100 rounded border border-secondary" style="max-height:300px;object-fit:contain;background:#111"></canvas>
      </div>
      <div>
        <div class="small text-muted mb-1">Result</div>
        <canvas id="canvas-result" class="w-100 rounded border border-secondary" style="max-height:300px;object-fit:contain;background:#111"></canvas>
      </div>
      <div>
        <div class="small text-muted mb-1">Diff ×4</div>
        <canvas id="canvas-diff" class="w-100 rounded border border-secondary" style="max-height:300px;object-fit:contain;background:#111"></canvas>
      </div>
    </div>

    <!-- Debug panel (full width) -->
    <div>
      <div class="small text-muted mb-1">Debug Panel (OK | Mask | Result | Diff×4)</div>
      <img id="img-debug" class="w-100 rounded border border-secondary" style="max-height:200px;object-fit:contain;background:#111;display:none">
    </div>
  </div>

  <!-- ── Right: Output ───────────────────────────────────────── -->
  <div class="card bg-dark border-secondary" style="width:240px;min-width:240px;overflow-y:auto">
    <div class="card-body p-3">
      <h6 class="text-info fw-bold mb-3">Output</h6>

      <!-- QC / metadata -->
      <div id="qc-box" class="mb-3" style="display:none">
        <div class="small fw-semibold text-muted mb-1">QC</div>
        <span id="qc-verdict" class="badge bg-secondary">—</span>
        <div class="small text-muted mt-1" id="qc-meta"></div>
      </div>

      <!-- Save button -->
      <button class="btn btn-success btn-sm w-100 mb-2" onclick="saveResult()">💾 Save</button>
      <button class="btn btn-outline-secondary btn-sm w-100 mb-3" onclick="downloadResult()">⬇ Download PNG</button>

      <!-- OK Library -->
      <div>
        <div class="small fw-semibold text-muted mb-1">OK Library</div>
        <div id="ok-library" class="d-flex flex-wrap gap-1" style="max-height:160px;overflow-y:auto"></div>
      </div>

      <hr class="border-secondary my-2">

      <!-- Recent results -->
      <div>
        <div class="small fw-semibold text-muted mb-1">Recent Results</div>
        <div id="results-gallery" class="d-flex flex-wrap gap-1" style="max-height:200px;overflow-y:auto"></div>
        <button class="btn btn-outline-secondary btn-sm w-100 mt-1" onclick="loadResults()">🔄 Refresh</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Batch Modal ─────────────────────────────────────────────── -->
<div id="batch-modal" class="position-fixed top-0 start-0 w-100 h-100 d-none align-items-center justify-content-center"
     style="background:rgba(0,0,0,0.7);z-index:9999;display:none!important">
  <div class="card bg-dark border-secondary p-4" style="width:400px">
    <h6 class="text-warning mb-3">📦 Batch Generation</h6>
    <label class="form-label small">Number of images</label>
    <input type="number" id="batch-n" class="form-control form-control-sm bg-dark border-secondary text-light mb-3" value="20" min="1" max="500">
    <div class="progress mb-3" style="height:8px;display:none" id="batch-progress-bar">
      <div class="progress-bar progress-bar-striped progress-bar-animated" id="batch-progress" style="width:0%"></div>
    </div>
    <div id="batch-status" class="small text-muted mb-3"></div>
    <div class="d-flex gap-2">
      <button class="btn btn-warning flex-grow-1" onclick="startBatch()">🚀 Start</button>
      <button class="btn btn-outline-secondary" onclick="document.getElementById('batch-modal').style.display='none'">✕ Close</button>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let okImageB64 = null;
let resultB64  = null;
let circleInfo = null;
let batchJobId = null;
let batchTimer = null;

// ── Product/defect change ─────────────────────────────────────────────────────
function onProductChange() { loadOkLibrary(); }

function onDefectChange() {
  const dt = document.getElementById('sel-defect').value;
  const scratch = ['scratch'];
  const spots   = ['dark_spots'];

  document.getElementById('params-polar').style.display   = 'none';
  document.getElementById('params-ring').style.display    = 'none';
  document.getElementById('params-scratch').style.display = scratch.includes(dt) ? '' : 'none';
  document.getElementById('params-spots').style.display   = spots.includes(dt)   ? '' : 'none';
}

onDefectChange(); // init

// ── OK Image upload ───────────────────────────────────────────────────────────
function onOkUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    okImageB64 = dataUrl.split(',')[1];
    drawToCanvas('canvas-ok', dataUrl);
    status('OK image loaded');
  };
  reader.readAsDataURL(file);
}

// ── Load OK library ───────────────────────────────────────────────────────────
async function loadOkLibrary() {
  const product = document.getElementById('sel-product').value;
  const defect  = document.getElementById('sel-defect').value;
  const r = await fetch(`/api/cap/ok-images?product=${product}&defect=${defect}`);
  if (!r.ok) return;
  const data = await r.json();
  const box  = document.getElementById('ok-library');
  box.innerHTML = '';
  if (!data.images?.length) {
    box.innerHTML = '<span class="small text-muted">No images</span>';
    return;
  }
  data.images.forEach(img => {
    const el = document.createElement('img');
    el.src   = 'data:image/png;base64,' + img.thumb_b64;
    el.title = img.filename;
    el.style.cssText = 'height:40px;cursor:pointer;border:2px solid transparent;border-radius:4px';
    el.onclick = () => selectOkImage(img, el);
    box.appendChild(el);
  });
}

async function selectOkImage(img, el) {
  document.querySelectorAll('#ok-library img').forEach(e => e.style.borderColor = 'transparent');
  el.style.borderColor = '#0d6efd';
  status('Loading OK image...');
  const r = await fetch(img.path.startsWith('http') ? img.path : `/api/cap/ok-images?product=mka&defect=scratch`);
  // Load full image directly
  const resp = await fetch('/api/cap/ok-images?product=' +
    encodeURIComponent(document.getElementById('sel-product').value) +
    '&defect=' + encodeURIComponent(document.getElementById('sel-defect').value));
  // Use File API to read the full image
  const fullResp = await fetch(`/api/cap/load-image?path=${encodeURIComponent(img.path)}`);
  if (fullResp.ok) {
    const blob = await fullResp.blob();
    const dataUrl = await blobToDataUrl(blob);
    okImageB64 = dataUrl.split(',')[1];
    drawToCanvas('canvas-ok', dataUrl);
    status('OK loaded: ' + img.filename);
  } else {
    // fallback: use thumb (low-res)
    okImageB64 = img.thumb_b64;
    drawToCanvas('canvas-ok', 'data:image/png;base64,' + img.thumb_b64);
    status('OK loaded (thumb): ' + img.filename);
  }
}

function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// ── Canvas drawing ────────────────────────────────────────────────────────────
function drawToCanvas(canvasId, src) {
  const canvas = document.getElementById(canvasId);
  const ctx    = canvas.getContext('2d');
  const img    = new Image();
  img.onload = () => {
    canvas.width  = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
  };
  img.src = src.startsWith('data:') ? src : 'data:image/png;base64,' + src;
}

// ── Circle detection ──────────────────────────────────────────────────────────
async function detectCircle() {
  if (!okImageB64) { status('Load OK image first'); return; }
  status('Detecting circle...');
  const r = await fetch('/api/cap/detect-circle', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({image_b64: okImageB64})
  });
  if (!r.ok) { status('Circle detection failed'); return; }
  circleInfo = await r.json();
  status(`Circle: center=(${circleInfo.cx},${circleInfo.cy}) r=${circleInfo.r}`);
}

// ── Build params ──────────────────────────────────────────────────────────────
function buildParams() {
  const dt = document.getElementById('sel-defect').value;
  const p  = {
    seed:      parseInt(document.getElementById('inp-seed').value) || 42,
    intensity: parseFloat(document.getElementById('slider-intensity').value),
  };

  if (dt === 'scratch') {
    p.mode = document.getElementById('sel-mode').value;
  }

  if (dt === 'dark_spots') {
    p.n_spots_min = 1;
    p.n_spots_max = 1;
    p.r_min = parseInt(document.getElementById('inp-r-min').value);
    p.r_max = parseInt(document.getElementById('inp-r-max').value);
    p.bump  = true;
  }

  return p;
}

// ── Preview ───────────────────────────────────────────────────────────────────
async function runPreview() {
  if (!okImageB64) { status('Load OK image first'); return; }
  const btn = document.getElementById('btn-preview');
  btn.disabled = true; btn.textContent = '⏳ Generating...';
  status('Generating...');

  try {
    const r = await fetch('/api/cap/preview', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        image_b64:   okImageB64,
        product:     document.getElementById('sel-product').value,
        defect_type: document.getElementById('sel-defect').value,
        params:      buildParams()
      })
    });
    const data = await r.json();
    if (data.error) { status('Error: ' + data.error); return; }

    resultB64 = data.result_image;
    drawToCanvas('canvas-result', data.result_image);
    if (data.mask_b64) drawToCanvas('canvas-mask', data.mask_b64);

    // Diff canvas
    if (okImageB64 && data.result_image) computeDiff(okImageB64, data.result_image);

    // Debug panel
    const dbg = document.getElementById('img-debug');
    if (data.debug_panel) {
      dbg.src   = 'data:image/png;base64,' + data.debug_panel;
      dbg.style.display = '';
    }

    // QC
    const qc = data.qc || {};
    document.getElementById('qc-box').style.display = '';
    document.getElementById('qc-verdict').textContent = qc.verdict || '—';
    document.getElementById('qc-verdict').className = 'badge ' +
      (qc.verdict === 'PASS' ? 'bg-success' : qc.verdict === 'FAIL' ? 'bg-danger' : 'bg-secondary');

    const meta = data.metadata || {};
    document.getElementById('qc-meta').textContent = JSON.stringify(meta, null, 1).slice(0, 200);

    status('Done ✓');
  } catch(e) {
    status('Error: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '⚡ Preview';
  }
}

// ── Compute diff on canvas ────────────────────────────────────────────────────
function computeDiff(b641, b642) {
  const img1 = new Image(), img2 = new Image();
  let loaded = 0;
  const onLoad = () => {
    if (++loaded < 2) return;
    const c = document.getElementById('canvas-diff');
    c.width  = img1.width;
    c.height = img1.height;
    const ctx = c.getContext('2d');
    ctx.drawImage(img1, 0, 0);
    const d1 = ctx.getImageData(0, 0, c.width, c.height);
    ctx.drawImage(img2, 0, 0);
    const d2 = ctx.getImageData(0, 0, c.width, c.height);
    const out = ctx.createImageData(c.width, c.height);
    for (let i = 0; i < d1.data.length; i += 4) {
      for (let j = 0; j < 3; j++)
        out.data[i+j] = Math.min(255, Math.abs(d1.data[i+j] - d2.data[i+j]) * 4);
      out.data[i+3] = 255;
    }
    ctx.putImageData(out, 0, 0);
  };
  img1.onload = onLoad; img2.onload = onLoad;
  img1.src = 'data:image/png;base64,' + b641;
  img2.src = 'data:image/png;base64,' + b642;
}

// ── Save / Download ───────────────────────────────────────────────────────────
async function saveResult() {
  if (!resultB64) { status('Generate first'); return; }
  const r = await fetch('/api/cap/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      result_b64:  resultB64,
      product:     document.getElementById('sel-product').value,
      defect_type: document.getElementById('sel-defect').value,
    })
  });
  const d = await r.json();
  status(d.saved ? '✅ Saved: ' + d.filename : '❌ Save failed');
}

function downloadResult() {
  if (!resultB64) { status('Generate first'); return; }
  const a = document.createElement('a');
  a.href     = 'data:image/png;base64,' + resultB64;
  a.download = document.getElementById('sel-defect').value + '_result.png';
  a.click();
}

// ── Batch ─────────────────────────────────────────────────────────────────────
async function startBatch() {
  if (!okImageB64) { status('Load OK image first'); return; }
  const n = parseInt(document.getElementById('batch-n').value) || 10;
  const r = await fetch('/api/cap/batch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      image_b64:   okImageB64,
      product:     document.getElementById('sel-product').value,
      defect_type: document.getElementById('sel-defect').value,
      params:      buildParams(),
      n_images:    n
    })
  });
  const d = await r.json();
  batchJobId = d.job_id;
  document.getElementById('batch-progress-bar').style.display = '';
  document.getElementById('batch-status').textContent = 'Queued...';
  batchTimer = setInterval(pollBatch, 1000);
}

async function pollBatch() {
  if (!batchJobId) return;
  const r = await fetch('/api/cap/batch/' + batchJobId);
  const d = await r.json();
  const pct = d.progress || 0;
  document.getElementById('batch-progress').style.width = pct + '%';
  document.getElementById('batch-status').textContent =
    `${d.status} — ${d.generated}/${d.total} generated, ${d.errors} errors`;
  if (d.status === 'done' || d.status === 'error') {
    clearInterval(batchTimer); batchTimer = null;
    status(d.status === 'done' ? `✅ Batch done: ${d.generated} images → ${d.out_dir}` : '❌ Batch error: ' + d.error);
    loadResults();
  }
}

// ── Results gallery ───────────────────────────────────────────────────────────
async function loadResults() {
  const product = document.getElementById('sel-product').value;
  const defect  = document.getElementById('sel-defect').value;
  const r = await fetch(`/api/cap/results?product=${product}&defect_type=${defect}&limit=20`);
  if (!r.ok) return;
  const data = await r.json();
  const box  = document.getElementById('results-gallery');
  box.innerHTML = '';
  if (!data.results?.length) { box.innerHTML = '<span class="small text-muted">No results</span>'; return; }
  data.results.forEach(res => {
    const el = document.createElement('div');
    el.className = 'small text-muted text-truncate w-100';
    el.textContent = res.filename;
    el.title = res.path;
    box.appendChild(el);
  });
}

// ── Misc ──────────────────────────────────────────────────────────────────────
function randomSeed() {
  document.getElementById('inp-seed').value = Math.floor(Math.random() * 99999);
}

function status(msg) {
  document.getElementById('status-msg').textContent = msg;
}

// Init
loadOkLibrary();
loadResults();
</script>
{% endblock %}
